<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Ambient glow blobs -->
  <ellipse cx="600" cy="200" rx="350" ry="180" fill="#6366f1" opacity="0.03"/>
  <ellipse cx="180" cy="200" rx="200" ry="160" fill="#38bdf8" opacity="0.04"/>

  <!-- Left side: RAG pipeline diagram -->
  <g transform="translate(40, 50)">

    <!-- Section label -->
    <text x="210" y="18" font-size="11" fill="#64748b" font-family="monospace" text-anchor="middle">RAG Pipeline</text>

    <!-- Step 1: Query Input -->
    <rect x="10" y="30" width="130" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="75" y="52" font-size="11" fill="#38bdf8" text-anchor="middle" font-family="monospace" font-weight="bold">User Query</text>

    <!-- Arrow 1 -->
    <line x1="140" y1="50" x2="170" y2="50" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <polyline points="140,50 155,50" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.7"/>
    <polygon points="155,46 163,50 155,54" fill="#38bdf8" opacity="0.7"/>

    <!-- Step 2: Embedding Generation -->
    <rect x="170" y="30" width="140" height="40" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
    <text x="240" y="48" font-size="10" fill="#a5b4fc" text-anchor="middle" font-family="monospace">Embedding</text>
    <text x="240" y="63" font-size="10" fill="#a5b4fc" text-anchor="middle" font-family="monospace">Generation</text>

    <!-- Arrow 2 -->
    <polyline points="310,50 325,50" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.7"/>
    <polygon points="325,46 333,50 325,54" fill="#6366f1" opacity="0.7"/>

    <!-- Step 3: Vector Search -->
    <rect x="333" y="30" width="120" height="40" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="393" y="48" font-size="10" fill="#c4b5fd" text-anchor="middle" font-family="monospace">Vector</text>
    <text x="393" y="63" font-size="10" fill="#c4b5fd" text-anchor="middle" font-family="monospace">Search</text>

    <!-- Vector db visual below vector search -->
    <g transform="translate(350, 90)">
      <!-- Database cylinder top -->
      <ellipse cx="43" cy="10" rx="38" ry="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
      <rect x="5" y="10" width="76" height="35" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
      <ellipse cx="43" cy="45" rx="38" ry="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
      <!-- DB label -->
      <text x="43" y="32" font-size="9" fill="#c4b5fd" text-anchor="middle" font-family="monospace">Vector DB</text>
      <!-- Similarity threshold badge -->
      <rect x="0" y="60" width="86" height="18" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
      <text x="43" y="72" font-size="9" fill="#c4b5fd" text-anchor="middle" font-family="monospace">sim ≥ 0.60</text>
    </g>

    <!-- Arrow down from Vector Search to DB -->
    <line x1="393" y1="70" x2="393" y2="92" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="389,90 393,99 397,90" fill="#8b5cf6" opacity="0.6"/>

    <!-- Step 4: LLM Response -->
    <rect x="10" y="200" width="440" height="50" rx="6" fill="#0f172a" stroke="url(#cyanGrad)" stroke-width="1.5"/>
    <text x="220" y="223" font-size="11" fill="#7dd3fc" text-anchor="middle" font-family="monospace" font-weight="bold">LLM Backend</text>
    <text x="220" y="240" font-size="10" fill="#64748b" text-anchor="middle" font-family="monospace">Fact-grounded · Anti-hallucination · Configurable temperature</text>

    <!-- Arrow from vector search result to LLM -->
    <polyline points="393,170 393,190 220,190 220,200" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.7"/>

    <!-- Response output bubble -->
    <rect x="10" y="270" width="195" height="48" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
    <text x="108" y="290" font-size="10" fill="#7dd3fc" text-anchor="middle" font-family="monospace">Response:</text>
    <text x="108" y="307" font-size="10" fill="#cbd5e1" text-anchor="middle" font-family="monospace">"Based on context..."</text>

    <!-- Arrow from LLM to response -->
    <polyline points="100,250 100,270" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polygon points="96,268 100,277 104,268" fill="#38bdf8" opacity="0.6"/>

    <!-- Chunking strategy badge -->
    <rect x="245" y="270" width="205" height="48" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <text x="348" y="290" font-size="10" fill="#a5b4fc" text-anchor="middle" font-family="monospace">Chunking Strategy:</text>
    <text x="348" y="307" font-size="10" fill="#cbd5e1" text-anchor="middle" font-family="monospace">Semantic · Overlapping</text>
  </g>

  <!-- Vertical divider -->
  <line x1="500" y1="0" x2="500" y2="400" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Right side: Code editor + neural visual -->
  <g transform="translate(530, 40)">
    <!-- Editor window -->
    <rect width="420" height="280" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="420" height="32" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <circle cx="20" cy="16" r="4" fill="#ef4444"/>
    <circle cx="40" cy="16" r="4" fill="#f59e0b"/>
    <circle cx="60" cy="16" r="4" fill="#10b981"/>
    <text x="90" y="22" font-size="12" fill="#94a3b8" font-family="monospace">aira_rag.py</text>

    <!-- Code lines -->
    <text x="20" y="58" font-size="11" fill="#94a3b8" font-family="monospace">1</text>
    <text x="40" y="58" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">from</text>
    <text x="90" y="58" font-size="11" fill="#fbbf24" font-family="monospace">aira</text>
    <text x="135" y="58" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">import</text>
    <text x="210" y="58" font-size="11" fill="#a3e635" font-family="monospace">RAGPipeline</text>

    <text x="20" y="78" font-size="11" fill="#94a3b8" font-family="monospace">2</text>
    <text x="40" y="78" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">from</text>
    <text x="90" y="78" font-size="11" fill="#fbbf24" font-family="monospace">aira.embed</text>
    <text x="200" y="78" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">import</text>
    <text x="275" y="78" font-size="11" fill="#a3e635" font-family="monospace">EmbedEngine</text>

    <text x="20" y="108" font-size="11" fill="#94a3b8" font-family="monospace">4</text>
    <text x="40" y="108" font-size="11" fill="#60a5fa" font-family="monospace">rag</text>
    <text x="72" y="108" font-size="11" fill="#f472b6" font-family="monospace"> = </text>
    <text x="100" y="108" font-size="11" fill="#a3e635" font-family="monospace">RAGPipeline(</text>

    <text x="20" y="128" font-size="11" fill="#94a3b8" font-family="monospace">5</text>
    <text x="55" y="128" font-size="11" fill="#cbd5e1" font-family="monospace">embedder=</text>
    <text x="165" y="128" font-size="11" fill="#a3e635" font-family="monospace">EmbedEngine()</text>

    <text x="20" y="148" font-size="11" fill="#94a3b8" font-family="monospace">6</text>
    <text x="55" y="148" font-size="11" fill="#cbd5e1" font-family="monospace">similarity_threshold=</text>
    <text x="250" y="148" font-size="11" fill="#fbbf24" font-family="monospace">0.6</text>

    <text x="20" y="168" font-size="11" fill="#94a3b8" font-family="monospace">7</text>
    <text x="55" y="168" font-size="11" fill="#cbd5e1" font-family="monospace">top_k=</text>
    <text x="130" y="168" font-size="11" fill="#fbbf24" font-family="monospace">5</text>

    <text x="20" y="188" font-size="11" fill="#94a3b8" font-family="monospace">8</text>
    <text x="40" y="188" font-size="11" fill="#a3e635" font-family="monospace">)</text>

    <text x="20" y="218" font-size="11" fill="#94a3b8" font-family="monospace">10</text>
    <text x="45" y="218" font-size="11" fill="#60a5fa" font-family="monospace">response</text>
    <text x="125" y="218" font-size="11" fill="#f472b6" font-family="monospace"> = </text>
    <text x="153" y="218" font-size="11" fill="#a3e635" font-family="monospace">rag.query(</text>

    <text x="20" y="238" font-size="11" fill="#94a3b8" font-family="monospace">11</text>
    <text x="55" y="238" font-size="11" fill="#cbd5e1" font-family="monospace">question, docs</text>

    <text x="20" y="258" font-size="11" fill="#94a3b8" font-family="monospace">12</text>
    <text x="40" y="258" font-size="11" fill="#a3e635" font-family="monospace">)</text>

    <!-- Cursor blink indicator -->
    <rect x="55" y="258" width="8" height="13" rx="1" fill="#6366f1" opacity="0.8"/>

    <!-- Feature pills below editor -->
    <rect x="0" y="295" width="100" height="22" rx="11" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
    <text x="50" y="310" font-size="10" fill="#a5b4fc" text-anchor="middle" font-family="monospace">In-House Embed</text>

    <rect x="108" y="295" width="90" height="22" rx="11" fill="#0891b2" opacity="0.2" stroke="#38bdf8" stroke-width="1"/>
    <text x="153" y="310" font-size="10" fill="#7dd3fc" text-anchor="middle" font-family="monospace">Vector Search</text>

    <rect x="206" y="295" width="90" height="22" rx="11" fill="#7c3aed" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
    <text x="251" y="310" font-size="10" fill="#d8b4fe" text-anchor="middle" font-family="monospace">Anti-Hallucin.</text>

    <rect x="304" y="295" width="110" height="22" rx="11" fill="#065f46" opacity="0.4" stroke="#10b981" stroke-width="1"/>
    <text x="359" y="310" font-size="10" fill="#6ee7b7" text-anchor="middle" font-family="monospace">Production-Grade</text>
  </g>

  <!-- Bottom title bar -->
  <text x="60" y="380" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="bold">Project AiRa</text>
  <text x="195" y="380" font-size="11" fill="#64748b" font-family="monospace"> — Retrieval-Augmented Generation System</text>
  <text x="780" y="380" font-size="11" fill="#64748b" font-family="monospace">Python · RAG · Embeddings · Vector Search · LLM</text>
</svg>
