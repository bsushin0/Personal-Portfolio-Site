<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Left side: Code Editor -->
  <g transform="translate(50, 40)">
    <!-- Editor window -->
    <rect width="420" height="320" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect width="420" height="32" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <circle cx="20" cy="16" r="4" fill="#ef4444"/>
    <circle cx="40" cy="16" r="4" fill="#f59e0b"/>
    <circle cx="60" cy="16" r="4" fill="#10b981"/>
    <text x="100" y="22" font-size="12" fill="#94a3b8" font-family="monospace">portfolio.tsx</text>

    <!-- Code content -->
    <text x="20" y="60" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">import</text>
    <text x="85" y="60" font-size="11" fill="#a3e635" font-family="monospace">{ RAG }</text>
    <text x="160" y="60" font-size="11" fill="#cbd5e1" font-family="monospace">from</text>
    <text x="220" y="60" font-size="11" fill="#fbbf24" font-family="monospace">'@ai'</text>

    <text x="20" y="85" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">export</text>
    <text x="85" y="85" font-size="11" fill="#cbd5e1" font-family="monospace" font-weight="bold">default</text>
    <text x="170" y="85" font-size="11" fill="#60a5fa" font-family="monospace">Portfolio</text>

    <text x="20" y="110" font-size="11" fill="#cbd5e1" font-family="monospace">  embeddings</text>
    <text x="240" y="110" font-size="11" fill="#f472b6" font-family="monospace">=</text>
    <text x="270" y="110" font-size="11" fill="#cbd5e1" font-family="monospace">{</text>

    <text x="20" y="135" font-size="11" fill="#cbd5e1" font-family="monospace">    model:</text>
    <text x="150" y="135" font-size="11" fill="#fbbf24" font-family="monospace">'text-embedding-004'</text>

    <text x="20" y="160" font-size="11" fill="#cbd5e1" font-family="monospace">    similarity:</text>
    <text x="200" y="160" font-size="11" fill="#a3e635" font-family="monospace">0.6</text>

    <text x="20" y="185" font-size="11" fill="#cbd5e1" font-family="monospace">  }</text>
  </g>

  <!-- Right side: Neural Network + Next.js -->
  <g transform="translate(530, 60)">
    <!-- Neural Network Nodes -->
    <!-- Node 1 -->
    <circle cx="80" cy="60" r="12" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
    <text x="80" y="66" font-size="8" fill="white" text-anchor="middle" font-weight="bold">AI</text>

    <!-- Node 2 -->
    <circle cx="200" cy="30" r="10" fill="#8b5cf6" opacity="0.7" filter="url(#glow)"/>
    
    <!-- Node 3 -->
    <circle cx="200" cy="90" r="10" fill="#8b5cf6" opacity="0.7" filter="url(#glow)"/>

    <!-- Node 4 -->
    <circle cx="320" cy="60" r="12" fill="#a78bfa" opacity="0.8" filter="url(#glow)"/>
    <text x="320" y="66" font-size="8" fill="white" text-anchor="middle" font-weight="bold">API</text>

    <!-- Connections -->
    <line x1="92" y1="60" x2="190" y2="30" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
    <line x1="92" y1="60" x2="190" y2="90" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
    <line x1="210" y1="30" x2="308" y2="60" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <line x1="210" y1="90" x2="308" y2="60" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>

    <!-- Next.js Logo Box -->
    <g transform="translate(50, 180)">
      <rect width="280" height="100" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
      <text x="140" y="40" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="Arial">Next.js 15</text>
      <text x="140" y="65" font-size="12" fill="#94a3b8" text-anchor="middle" font-family="monospace">Full-stack Framework</text>

      <!-- Feature pills -->
      <rect x="10" y="75" width="80" height="18" rx="9" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
      <text x="50" y="87" font-size="10" fill="#a3e635" text-anchor="middle">TypeScript</text>

      <rect x="100" y="75" width="80" height="18" rx="9" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
      <text x="140" y="87" font-size="10" fill="#a3e635" text-anchor="middle">RAG Ready</text>

      <rect x="190" y="75" width="80" height="18" rx="9" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
      <text x="230" y="87" font-size="10" fill="#a3e635" text-anchor="middle">Vercel Deploy</text>
    </g>
  </g>

  <!-- Accent line -->
  <line x1="500" y1="0" x2="500" y2="400" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>
</svg>
