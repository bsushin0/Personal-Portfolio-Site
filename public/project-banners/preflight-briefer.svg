<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#060a10"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#sky)"/>
  <rect width="800" height="420" fill="url(#center-glow)"/>

  <!-- Grid lines (aviation HUD style) -->
  <g stroke="rgba(245,158,11,0.06)" stroke-width="1">
    <line x1="0" y1="105" x2="800" y2="105"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="315" x2="800" y2="315"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
  </g>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="150" cy="80" r="1.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="700" cy="50" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="650" cy="90" r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="730" cy="130" r="1" fill="rgba(255,255,255,0.25)"/>
  <circle cx="50" cy="160" r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="760" cy="200" r="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Horizon line -->
  <line x1="0" y1="260" x2="800" y2="260" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Artificial horizon indicator (center) -->
  <g transform="translate(400, 210)" filter="url(#glow)">
    <circle cx="0" cy="0" r="60" stroke="rgba(245,158,11,0.3)" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="#f59e0b" opacity="0.8"/>
    <line x1="-25" y1="0" x2="-8" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="0" x2="25" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <!-- Pitch lines -->
    <line x1="-15" y1="-20" x2="15" y2="-20" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <line x1="-10" y1="-40" x2="10" y2="-40" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  </g>

  <!-- Airplane silhouette (top-down view, traveling right) -->
  <g transform="translate(390, 130)" filter="url(#glow)" opacity="0.85">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="28" ry="6" fill="url(#amber-glow)" transform="rotate(-15)"/>
    <!-- Wings -->
    <ellipse cx="-2" cy="0" rx="7" ry="22" fill="url(#amber-glow)" transform="rotate(-15)" opacity="0.9"/>
    <!-- Tail -->
    <ellipse cx="-22" cy="0" rx="4" ry="10" fill="url(#amber-glow)" transform="rotate(-15)" opacity="0.7"/>
  </g>

  <!-- Flight path trail -->
  <path d="M 100 200 Q 250 170 390 130" stroke="rgba(245,158,11,0.25)" stroke-width="1" fill="none" stroke-dasharray="3,6"/>

  <!-- Weather data readouts (left panel) -->
  <g font-family="monospace" font-size="9">
    <rect x="30" y="130" width="140" height="110" rx="4" fill="rgba(0,0,0,0.5)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
    <text x="42" y="148" fill="rgba(245,158,11,0.5)" font-size="7" letter-spacing="1.5">DEPARTURE</text>
    <text x="42" y="163" fill="#e2e8f0" font-size="10" font-weight="bold">KLAF</text>
    <rect x="100" y="153" width="28" height="13" rx="2" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="104" y="163" fill="#4ade80" font-size="8" font-weight="bold">VFR</text>
    <text x="42" y="180" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">WIND</text>
    <text x="42" y="191" fill="#cbd5e1" font-size="8">270° @ 12 kt</text>
    <text x="42" y="205" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">VIS</text>
    <text x="42" y="216" fill="#cbd5e1" font-size="8">10+ SM</text>
    <text x="42" y="228" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">CEIL</text>
    <text x="42" y="239" fill="#cbd5e1" font-size="8">FEW 4500</text>
  </g>

  <!-- Destination readout (right panel) -->
  <g font-family="monospace" font-size="9">
    <rect x="630" y="130" width="140" height="110" rx="4" fill="rgba(0,0,0,0.5)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
    <text x="642" y="148" fill="rgba(245,158,11,0.5)" font-size="7" letter-spacing="1.5">DESTINATION</text>
    <text x="642" y="163" fill="#e2e8f0" font-size="10" font-weight="bold">KORD</text>
    <rect x="700" y="153" width="32" height="13" rx="2" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
    <text x="704" y="163" fill="#60a5fa" font-size="8" font-weight="bold">MVFR</text>
    <text x="642" y="180" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">WIND</text>
    <text x="642" y="191" fill="#cbd5e1" font-size="8">180° @ 8 kt</text>
    <text x="642" y="205" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">VIS</text>
    <text x="642" y="216" fill="#cbd5e1" font-size="8">3 SM -RA</text>
    <text x="642" y="228" fill="rgba(255,255,255,0.3)" font-size="7" letter-spacing="1">CEIL</text>
    <text x="642" y="239" fill="#cbd5e1" font-size="8">BKN 2200</text>
  </g>

  <!-- AI Briefing output box (bottom) -->
  <rect x="180" y="290" width="440" height="90" rx="6" fill="rgba(0,0,0,0.55)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <rect x="180" y="290" width="440" height="22" rx="6" fill="rgba(245,158,11,0.06)"/>
  <rect x="180" y="302" width="440" height="10" rx="0" fill="rgba(245,158,11,0.06)"/>
  <circle cx="196" cy="301" r="4" fill="rgba(245,158,11,0.6)"/>
  <text x="210" y="305" font-family="monospace" font-size="7.5" fill="rgba(245,158,11,0.6)" letter-spacing="1.5">AI WEATHER BRIEFING</text>
  <g font-family="monospace" font-size="8" fill="rgba(203,213,225,0.6)">
    <text x="196" y="324">✈️  Overall VFR at KLAF. Expect marginal conditions at KORD — BKN 2200, -RA.</text>
    <text x="196" y="338">⚠️  AIRMET SIERRA active for IFR conditions along route above FL180.</text>
    <text x="196" y="352">🟡  MVFR conditions at destination. IFR-rated recommended. File IFR alternate.</text>
    <text x="196" y="366">📋  Obtain official brief at 1800wxbrief.com before departure.</text>
  </g>

  <!-- Cursor blink -->
  <rect x="635" y="357" width="5" height="10" fill="rgba(245,158,11,0.7)" rx="1"/>

  <!-- Title overlay -->
  <text x="400" y="58" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">Pre-Flight AI Briefer</text>
  <text x="400" y="78" font-family="monospace" font-size="9" fill="rgba(245,158,11,0.5)" text-anchor="middle" letter-spacing="2">LIVE FAA DATA · CLAUDE AI · STREAMING</text>
</svg>
