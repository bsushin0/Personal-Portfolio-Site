<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="wineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#be185d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c026d3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.5" />
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Subtle radial glow on left -->
  <ellipse cx="220" cy="200" rx="260" ry="200" fill="#7c3aed" opacity="0.04"/>

  <!-- Left side: Wine glass silhouette + label -->
  <g transform="translate(60, 40)">
    <!-- Wine glass stem and base -->
    <rect x="105" y="250" width="10" height="60" rx="3" fill="#be185d" opacity="0.6"/>
    <ellipse cx="110" cy="316" rx="55" ry="8" fill="#be185d" opacity="0.35"/>

    <!-- Wine glass bowl outline -->
    <path d="M 55 40 Q 40 140 65 200 Q 80 230 110 240 Q 140 230 155 200 Q 180 140 165 40 Z"
          fill="#1e293b" stroke="#be185d" stroke-width="1.5" opacity="0.9"/>

    <!-- Wine fill (about 60% full) -->
    <path d="M 70 145 Q 60 185 70 210 Q 85 235 110 240 Q 135 235 150 210 Q 160 185 150 145 Z"
          fill="#be185d" opacity="0.35"/>
    <!-- Wine surface shimmer -->
    <ellipse cx="110" cy="145" rx="40" ry="5" fill="#ec4899" opacity="0.4"/>

    <!-- Glass highlight -->
    <path d="M 68 60 Q 62 100 66 130" stroke="#cbd5e1" stroke-width="1.5" fill="none" opacity="0.25"/>

    <!-- "92% accuracy" badge -->
    <rect x="155" y="50" width="120" height="32" rx="6" fill="#7c3aed" opacity="0.25" stroke="#a855f7" stroke-width="1"/>
    <text x="215" y="70" font-size="13" fill="#e879f9" text-anchor="middle" font-family="monospace" font-weight="bold">92% Accuracy</text>

    <!-- MLOps badge -->
    <rect x="155" y="94" width="120" height="32" rx="6" fill="#be185d" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
    <text x="215" y="114" font-size="13" fill="#f9a8d4" text-anchor="middle" font-family="monospace" font-weight="bold">MLOps Pipeline</text>

    <!-- BASF badge -->
    <rect x="155" y="138" width="120" height="32" rx="6" fill="#1e293b" opacity="0.8" stroke="#475569" stroke-width="1"/>
    <text x="215" y="158" font-size="13" fill="#94a3b8" text-anchor="middle" font-family="monospace">Built for BASF</text>
  </g>

  <!-- Vertical divider -->
  <line x1="500" y1="0" x2="500" y2="400" stroke="url(#lineGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Right side: Forecast chart -->
  <g transform="translate(530, 40)">
    <!-- Chart frame -->
    <rect width="620" height="300" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.7"/>

    <!-- Chart title bar -->
    <rect width="620" height="30" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <circle cx="18" cy="15" r="4" fill="#ef4444"/>
    <circle cx="38" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="58" cy="15" r="4" fill="#10b981"/>
    <text x="90" y="21" font-size="11" fill="#94a3b8" font-family="monospace">wine_forecast.py — BASF Yield Model</text>

    <!-- Y-axis label -->
    <text x="20" y="180" font-size="10" fill="#64748b" font-family="monospace" transform="rotate(-90, 20, 180)">Sales Volume</text>

    <!-- X-axis ticks and labels -->
    <line x1="60" y1="270" x2="600" y2="270" stroke="#334155" stroke-width="1"/>
    <text x="100" y="285" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Q1</text>
    <text x="200" y="285" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Q2</text>
    <text x="300" y="285" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Q3</text>
    <text x="400" y="285" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Q4</text>
    <text x="500" y="285" font-size="9" fill="#64748b" font-family="monospace" text-anchor="middle">Q1+</text>

    <!-- Gridlines -->
    <line x1="60" y1="210" x2="600" y2="210" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="60" y1="160" x2="600" y2="160" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="60" y1="110" x2="600" y2="110" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Bar chart: actual sales data -->
    <rect x="80" y="180" width="36" height="90" rx="2" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="180" y="155" width="36" height="115" rx="2" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="280" y="135" width="36" height="135" rx="2" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="380" y="165" width="36" height="105" rx="2" fill="url(#barGrad)" opacity="0.7"/>

    <!-- Forecast bar (dashed border style) -->
    <rect x="480" y="145" width="36" height="125" rx="2" fill="#7c3aed" opacity="0.25" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Trend / forecast line -->
    <polyline points="98,180 198,155 298,135 398,160 498,145"
              fill="none" stroke="url(#lineGrad)" stroke-width="2.5" filter="url(#glow)"/>

    <!-- Data point circles -->
    <circle cx="98" cy="180" r="5" fill="#ec4899" filter="url(#glow)"/>
    <circle cx="198" cy="155" r="5" fill="#ec4899" filter="url(#glow)"/>
    <circle cx="298" cy="135" r="5" fill="#ec4899" filter="url(#glow)"/>
    <circle cx="398" cy="160" r="5" fill="#ec4899" filter="url(#glow)"/>
    <circle cx="498" cy="145" r="6" fill="#a855f7" stroke="#e879f9" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Forecast label -->
    <text x="498" y="135" font-size="9" fill="#a855f7" text-anchor="middle" font-family="monospace">Forecast</text>

    <!-- Legend -->
    <rect x="400" y="50" width="12" height="12" rx="2" fill="#be185d" opacity="0.7"/>
    <text x="418" y="60" font-size="10" fill="#94a3b8" font-family="monospace">Actual</text>
    <line x1="400" y1="78" x2="412" y2="78" stroke="#ec4899" stroke-width="2"/>
    <circle cx="406" cy="78" r="3" fill="#ec4899"/>
    <text x="418" y="82" font-size="10" fill="#94a3b8" font-family="monospace">Trend Line</text>
    <rect x="400" y="94" width="12" height="12" rx="2" fill="#7c3aed" opacity="0.3" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="418" y="104" font-size="10" fill="#94a3b8" font-family="monospace">Predicted</text>

    <!-- Model stats inline -->
    <text x="80" y="55" font-size="10" fill="#64748b" font-family="monospace">Model:</text>
    <text x="130" y="55" font-size="10" fill="#a3e635" font-family="monospace">TensorFlow + Keras</text>
    <text x="80" y="72" font-size="10" fill="#64748b" font-family="monospace">Pipeline:</text>
    <text x="145" y="72" font-size="10" fill="#fbbf24" font-family="monospace">2-3 days → 1-2 hours</text>
  </g>

  <!-- Bottom title -->
  <text x="60" y="380" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="bold">Wine Varietals Yield Forecasting</text>
  <text x="400" y="380" font-size="11" fill="#64748b" font-family="monospace">Time-Series ML · MLOps · Python · TensorFlow</text>
</svg>
